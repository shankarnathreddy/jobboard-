<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | JobBoard</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<!-- ================= HEADER ================= -->

<header>
    <nav class="navbar container">

        <div class="logo">
            <i class="fa-solid fa-briefcase"></i>
            JobBoard
        </div>

        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="jobs.html">Jobs</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="my-applications.html">My Applications</a></li>
        </ul>

        <div class="nav-buttons">
            <a href="login.html" class="login-btn">Login</a>
            <a href="signup.html" class="signup-btn">Sign Up</a>
        </div>

        <div class="menu-btn" id="menuBtn">
            <i class="fa-solid fa-bars"></i>
        </div>

    </nav>
</header>

<!-- ================= SIGNUP ================= -->

<section class="signup-section">

    <div class="signup-card">

        <h2>Create Account</h2>
        <p>Join JobBoard and start your career journey.</p>

        <form>

            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" placeholder="Full Name" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="Email Address" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" placeholder="Mobile Number" pattern="[0-9]{10}" minlength="10" maxlength="10" required title="Please Enter In Digits">
            </div>

            <div class="input-group password-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
                
                <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
            </div>
            
            <div class="input-group password-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                
                <i class="fa-solid fa-eye toggle-password" id="toggleConfirmPassword"></i>
            </div>

            <button class="submit-btn" type="submit">
                Create Account
            </button>

        </form>

        <div class="divider">OR</div>

        <button class="google-btn">
            <i class="fa-brands fa-google"></i>
            Sign Up with Google
        </button>

        <p class="signup-text">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

</section>

<script src="js/script.js"></script>
<script src="js/signup.js"></script>
<script src="js/auth-nav.js"></script>

</body>
</html>
